name: shellcheck

on:
  push:
    branches: [main]
    paths:
      - 'sofagent/scripts/**/*.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sofagent/scripts/**/*.sh'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        env:
          SHELLCHECK_OPTS: -s bash -e SC2086 -e SC2155 -e SC2034 -e SC1090 -e SC1091
