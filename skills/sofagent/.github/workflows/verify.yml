name: verify
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup minimal sofagent environment
        run: |
          bash sofagent/scripts/install.sh --platform openclaw --no-ao --quick 2>/dev/null || {
            # install.sh fallback 到手动部署
            echo "[CI] install.sh failed, fallback to manual setup"
            mkdir -p ~/.openclaw/skills/sofagent
            cp sofagent/rules.md ~/.openclaw/skills/sofagent/rules.md
            cp sofagent/SKILL.md ~/.openclaw/skills/sofagent/SKILL.md
            for f in engine.md entry-gate.md task-aware.md task-closure.md loop-check.md; do
              [ -f "sofagent/$f" ] && cp "sofagent/$f" ~/.openclaw/skills/sofagent/
            done
            mkdir -p ~/.openclaw/skills/sofagent/data
            cp sofagent/data/*.md ~/.openclaw/skills/sofagent/data/ 2>/dev/null || true
            cp -r sofagent/scripts ~/.openclaw/
            chmod +x ~/.openclaw/scripts/*.sh
            mkdir -p ~/.openclaw/hooks/sofagent-load-chain
            cp sofagent/hooks/sofagent-load-chain/HOOK.md ~/.openclaw/hooks/sofagent-load-chain/
            cp sofagent/hooks/sofagent-load-chain/handler.ts ~/.openclaw/hooks/sofagent-load-chain/
          }

      - name: Run verify.sh
        run: |
          bash sofagent/scripts/verify.sh --quiet || {
            echo "❌ verify.sh failed"
            exit 1
          }
          echo "✅ verify.sh passed"
